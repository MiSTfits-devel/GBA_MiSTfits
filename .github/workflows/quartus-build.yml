name: Quartus Build

on:
  push:
    branches: [2p-linkcable, release]
    tags: ['v*.*.*']
  pull_request:
    branches: [2p-linkcable]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.revision }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        revision: [GBA, GBA2P]
    steps:
      - uses: actions/checkout@v4

      - name: Compile ${{ matrix.revision }}
        env:
          REVISION: ${{ matrix.revision }}
        run: |
          cat > build.sh <<'EOF'
          set -e
          sed -i "s/NUM_PARALLEL_PROCESSORS 1/NUM_PARALLEL_PROCESSORS $(nproc)/" GBA.qsf
          quartus_sh --flow compile GBA -c "$REVISION"
          EOF
          chmod +x build.sh
          docker run --rm --entrypoint bash -v "$PWD:/work" -w /work -e REVISION raetro/quartus:17.0 build.sh

      - name: Detailed timing report
        if: success()
        env:
          REVISION: ${{ matrix.revision }}
        run: |
          cat > sta.sh <<'EOF'
          set -e
          printf '%s\n' \
            "project_open GBA -revision $REVISION" \
            "create_timing_netlist" \
            "read_sdc" \
            "update_timing_netlist" \
            "report_timing -setup -npaths 50 -detail full_path -file output_files/$REVISION.paths.rpt" \
            "project_close" > paths.tcl
          quartus_sta -t paths.tcl
          EOF
          chmod +x sta.sh
          docker run --rm --entrypoint bash -v "$PWD:/work" -w /work -e REVISION raetro/quartus:17.0 sta.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quartus-${{ matrix.revision }}
          path: |
            output_files/${{ matrix.revision }}.rbf
            output_files/${{ matrix.revision }}.fit.summary
            output_files/${{ matrix.revision }}.map.summary
            output_files/${{ matrix.revision }}.sta.summary
            output_files/${{ matrix.revision }}.sta.rpt
            output_files/${{ matrix.revision }}.paths.rpt
            output_files/${{ matrix.revision }}.flow.rpt
            output_files/${{ matrix.revision }}.fit.rpt
            output_files/${{ matrix.revision }}.map.rpt
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Publish release
    needs: build
    if: success() && (github.ref_type == 'tag' || github.ref_name == 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: quartus-*
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'release' }}
          prerelease: ${{ github.ref_type != 'tag' }}
          files: artifacts/*.rbf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
